name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy (manual)
    runs-on: ubuntu-latest
    concurrency:
      group: hetzner-deploy
      cancel-in-progress: false

    steps:
      - name: SSH — pull, rebuild, recreate containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH }}"
            git pull
            chmod +x scripts/deploy.sh scripts/backup-mongo.sh || true
            ./scripts/deploy.sh redeploy
