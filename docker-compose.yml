services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./party-spies-back
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/party-spies}
      JWT_SK: ${JWT_SK}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app
    expose:
      - "5000"

  frontend:
    build:
      context: ./party-spies-front
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mongo_data:
